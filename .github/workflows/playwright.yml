name: Playwright Full Suite Daily Run

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
  - cron: "0 3 * * *"   # Runs at 8:30 AM IST

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Cleanup old reports
        run: |
          echo "Cleaning ONLY test-reports folder..."
          if [ -d "test-reports" ]; then
            rm -rf test-reports/*
          fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ⭐ AUTO-RUN ALL TEST FOLDERS INSIDE tests/
      - name: Run LQ Website Test suite
        run: |
          echo "=== AUTO RUNNING ALL TEST FOLDERS ==="
          for d in tests/*; do
            if [ -d "$d" ]; then
              echo "▶ Running: $d"
              npx playwright test "$d" || true
            fi
          done

      - name: Mark test passed
        if: ${{ success() }}
        run: |
          mkdir -p test-results
          echo "PASSED" > test-results/status.txt

      - name: Mark test failed
        if: ${{ failure() }}
        run: |
          mkdir -p test-results
          echo "FAILED" > test-results/status.txt

      - name: Zip entire test-reports folder
        run: |
          echo "Zipping FULL test-reports..."
          if [ -d "test-reports" ]; then
            zip -r playwright_full_report.zip test-reports
          else
            echo "test-reports NOT FOUND"
            touch playwright_full_report.zip
          fi

      - name: Upload Full Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Full-Playwright-Report
          path: playwright_full_report.zip
          compression-level: 0

      - name: Debug Email Recipients
        run: |
          echo "=== EMAIL RECIPIENTS DEBUG ==="
          echo "TO (masked): $EMAIL_TO"
          echo "CC (masked): $EMAIL_CC"
          echo "BCC (masked): $EMAIL_BCC"
          echo "-------------------------------"
          echo "TO Count : $(echo "$EMAIL_TO" | tr ',' '\n' | wc -l)"
          echo "CC Count : $(echo "$EMAIL_CC" | tr ',' '\n' | wc -l)"
          echo "BCC Count: $(echo "$EMAIL_BCC" | tr ',' '\n' | wc -l)"
          echo "-------------------------------"
          echo "TO Length : ${#EMAIL_TO}"
          echo "CC Length : ${#EMAIL_CC}"
          echo "BCC Length: ${#EMAIL_BCC}"
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
          EMAIL_BCC: ${{ secrets.EMAIL_BCC }}

      - name: Send Email Report
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
          EMAIL_BCC: ${{ secrets.EMAIL_BCC }}
          ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node .vscode/sendMail.js
